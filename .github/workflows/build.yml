name: Build Chameleon Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Zip dosyasını çıkart
        run: |
          ZIP=$(find . -not -path '*/.git/*' -name "*.zip" | head -1)
          if [ -n "$ZIP" ]; then
            echo "Zip bulundu: $ZIP"
            unzip -o "$ZIP" -d extracted/
            BUILD_FILE=$(find extracted/ -name "build.gradle" | head -1)
            BUILD_DIR=$(dirname "$BUILD_FILE")
            echo "Build dizini: $BUILD_DIR"
            cp -r "$BUILD_DIR"/. .
          else
            echo "Zip bulunamadı, dosyalar zaten açık olabilir."
          fi

      - name: Yapıyı doğrula
        run: |
          echo "=== Root içeriği ==="
          ls -la
          echo "=== build.gradle var mı ==="
          cat build.gradle | head -10

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Derle
        run: gradle build --no-daemon

      - name: .jar dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: chameleon-mod
          path: build/libs/*.jar
          if-no-files-found: error
