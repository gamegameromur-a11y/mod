name: "🦎 Chameleon Mod — Build & Release"

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Zip dosyası adı (boş bırakırsan otomatik bulur)'
        required: false
        default: ''

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "🔨 Build"
    runs-on: ubuntu-latest

    steps:

      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "☕ Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "📦 Zip dosyasını aç"
        id: extract
        run: |
          ZIP_INPUT="${{ github.event.inputs.zip_name }}"
          if [ -n "$ZIP_INPUT" ] && [ -f "$ZIP_INPUT" ]; then
            ZIP="$ZIP_INPUT"
          else
            ZIP=$(find . -maxdepth 1 -name "*.zip" | sort | head -1)
          fi
          if [ -z "$ZIP" ]; then
            echo "❌ Repo kökünde .zip bulunamadı!"
            exit 1
          fi
          echo "✅ Zip: $ZIP"
          echo "zip_path=$ZIP" >> $GITHUB_OUTPUT
          unzip -q "$ZIP" -d extracted/

      - name: "🔧 Kod hatalarını düzelt"
        run: |
          # ── 1. RoleEffects: getSize() → size() ──────────────────────────
          FILE=$(find extracted -path "*/role/RoleEffects.java" | head -1)
          if [ -n "$FILE" ]; then
            sed -i 's/\.getEnchantments()\.getSize()/.getEnchantments().size()/g' "$FILE"
            echo "✅ RoleEffects düzeltildi"
          fi

          # ── 2. PlayerEntityMixin: dosyayı tamamen yeniden yaz ────────────
          FILE=$(find extracted -path "*/mixin/PlayerEntityMixin.java" | head -1)
          if [ -n "$FILE" ]; then
            cat > "$FILE" << 'JAVA'
          package com.chameleon.mixin;

          import com.chameleon.paint.PlayerPaintStore;
          import com.chameleon.role.RoleManager;
          import net.minecraft.nbt.NbtCompound;
          import net.minecraft.server.network.ServerPlayerEntity;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Mixin(ServerPlayerEntity.class)
          public class PlayerEntityMixin {

              @Inject(method = "readCustomDataFromNbt", at = @At("TAIL"))
              private void onLoadNbt(NbtCompound nbt, CallbackInfo ci) {
                  ServerPlayerEntity self = (ServerPlayerEntity)(Object)this;
                  if (nbt.contains("ChameleonData")) {
                      PlayerPaintStore.loadPlayer(self.getUuid(), nbt.getCompound("ChameleonData"));
                  }
              }

              @Inject(method = "writeCustomDataToNbt", at = @At("TAIL"))
              private void onSaveNbt(NbtCompound nbt, CallbackInfo ci) {
                  ServerPlayerEntity self = (ServerPlayerEntity)(Object)this;
                  nbt.put("ChameleonData", PlayerPaintStore.savePlayer(self.getUuid()));
              }

              @Inject(method = "onDisconnect", at = @At("TAIL"))
              private void onPlayerLeave(CallbackInfo ci) {
                  ServerPlayerEntity self = (ServerPlayerEntity)(Object)this;
                  PlayerPaintStore.remove(self.getUuid());
                  RoleManager.remove(self.getUuid());
              }
          }
          JAVA
            echo "✅ PlayerEntityMixin yeniden yazıldı"
          fi

          # ── 3. PlayerModelMixin: dosyayı tamamen yeniden yaz ─────────────
          FILE=$(find extracted -path "*/mixin/PlayerModelMixin.java" | head -1)
          if [ -n "$FILE" ]; then
            cat > "$FILE" << 'JAVA'
          package com.chameleon.mixin;

          import com.chameleon.paint.PlayerPaintStore;
          import com.chameleon.pose.ChameleonPose;
          import net.fabricmc.api.EnvType;
          import net.fabricmc.api.Environment;
          import net.minecraft.client.model.ModelPart;
          import net.minecraft.client.network.AbstractClientPlayerEntity;
          import net.minecraft.client.render.entity.model.BipedEntityModel;
          import net.minecraft.entity.LivingEntity;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.Shadow;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Environment(EnvType.CLIENT)
          @Mixin(BipedEntityModel.class)
          public class PlayerModelMixin {

              @Shadow public ModelPart head;
              @Shadow public ModelPart body;
              @Shadow public ModelPart rightArm;
              @Shadow public ModelPart leftArm;
              @Shadow public ModelPart rightLeg;
              @Shadow public ModelPart leftLeg;

              @Inject(method = "setAngles", at = @At("RETURN"))
              private void applyCustomPose(LivingEntity entity,
                                           float limbAngle, float limbDistance,
                                           float animProgress, float headYaw, float headPitch,
                                           CallbackInfo ci) {
                  if (!(entity instanceof AbstractClientPlayerEntity player)) return;

                  ChameleonPose pose = PlayerPaintStore.getPose(player.getUuid());
                  if (pose == ChameleonPose.STAND) return;

                  resetAll();

                  switch (pose) {
                      case PRONE         -> applyProne();
                      case SIDE_LAY      -> applySideLay();
                      case CROUCH_CUSTOM -> applyCrouchCustom(headPitch);
                      case FETAL         -> applyFetal();
                      case WALL_HUG      -> applyWallHug(headPitch);
                  }
              }

              private void resetAll() {
                  head.pitch = 0;     head.yaw = 0;     head.roll = 0;
                  body.pitch = 0;     body.yaw = 0;     body.roll = 0;
                  rightArm.pitch = 0; rightArm.roll = 0; rightArm.yaw = 0;
                  leftArm.pitch  = 0; leftArm.roll  = 0; leftArm.yaw  = 0;
                  rightLeg.pitch = 0; rightLeg.roll = 0;
                  leftLeg.pitch  = 0; leftLeg.roll  = 0;
              }

              private void applyProne() {
                  body.pitch     = rad(90);
                  head.pitch     = rad(-90);
                  rightArm.pitch = rad(-160); rightArm.roll = rad(-20);
                  leftArm.pitch  = rad(-160); leftArm.roll  = rad( 20);
                  rightLeg.pitch = rad(-10);
                  leftLeg.pitch  = rad(-10);
              }

              private void applySideLay() {
                  body.roll     = rad(-90);
                  head.roll     = rad(-90);
                  rightArm.roll = rad(-90);
                  leftArm.roll  = rad(-90);
                  rightLeg.roll = rad(-15); rightLeg.pitch = rad( 10);
                  leftLeg.roll  = rad(-25); leftLeg.pitch  = rad(-10);
              }

              private void applyCrouchCustom(float headPitch) {
                  body.pitch     = rad(40);
                  head.pitch     = rad(-35) + headPitch;
                  rightArm.pitch = rad(-50); rightArm.roll = rad( 15);
                  leftArm.pitch  = rad(-50); leftArm.roll  = rad(-15);
                  rightLeg.pitch = rad(50);
                  leftLeg.pitch  = rad(50);
              }

              private void applyFetal() {
                  body.pitch     = rad(70);
                  head.pitch     = rad(-60);
                  rightArm.pitch = rad(-120); rightArm.roll = rad( 30);
                  leftArm.pitch  = rad(-120); leftArm.roll  = rad(-30);
                  rightLeg.pitch = rad(130);  rightLeg.roll = rad( 10);
                  leftLeg.pitch  = rad(130);  leftLeg.roll  = rad(-10);
              }

              private void applyWallHug(float headPitch) {
                  body.pitch     = rad(-20);
                  head.pitch     = rad(15) + headPitch;
                  rightArm.pitch = rad(-170); rightArm.roll = rad( 25);
                  leftArm.pitch  = rad(-170); leftArm.roll  = rad(-25);
                  rightLeg.pitch = rad(10);
                  leftLeg.pitch  = rad(10);
              }

              private static float rad(float deg) { return (float) Math.toRadians(deg); }
          }
          JAVA
            echo "✅ PlayerModelMixin yeniden yazıldı"
          fi

      - name: "🔍 Mod klasörünü bul"
        id: moddir
        run: |
          GRADLEW=$(find extracted -name "gradlew" -type f | head -1)
          if [ -n "$GRADLEW" ]; then
            MODDIR=$(dirname "$GRADLEW")
            chmod +x "$GRADLEW"
          else
            BUILD=$(find extracted -name "build.gradle" | head -1)
            if [ -z "$BUILD" ]; then
              echo "❌ build.gradle bulunamadı!"
              exit 1
            fi
            MODDIR=$(dirname "$BUILD")
            printf '#!/bin/sh\nexec gradle "$@"\n' > "$MODDIR/gradlew"
            chmod +x "$MODDIR/gradlew"
          fi
          echo "✅ Mod klasörü: $MODDIR"
          echo "moddir=$MODDIR" >> $GITHUB_OUTPUT

      - name: "⚙️ Gradle kur"
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: "🗄️ Gradle cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('extracted/**/gradle-wrapper.properties', 'extracted/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: "🔨 Derle"
        working-directory: ${{ steps.moddir.outputs.moddir }}
        run: gradle build --no-daemon --stacktrace

      - name: "🔎 Jar dosyasını bul"
        id: jarinfo
        run: |
          MODDIR="${{ steps.moddir.outputs.moddir }}"
          JAR=$(find "$MODDIR/build/libs" -name "*.jar" \
                  ! -name "*-sources.jar" \
                  ! -name "*-dev.jar" \
                  ! -name "*-javadoc.jar" \
                | sort | head -1)
          if [ -z "$JAR" ]; then
            echo "❌ Jar bulunamadı!"
            exit 1
          fi
          JARNAME=$(basename "$JAR")
          JARSIZE=$(du -sh "$JAR" | cut -f1)
          echo "✅ Jar: $JARNAME ($JARSIZE)"
          echo "jar_path=$JAR"     >> $GITHUB_OUTPUT
          echo "jar_name=$JARNAME" >> $GITHUB_OUTPUT
          echo "jar_size=$JARSIZE" >> $GITHUB_OUTPUT

      - name: "📤 Artifact yükle"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.jarinfo.outputs.jar_name }}
          path: ${{ steps.jarinfo.outputs.jar_path }}
          if-no-files-found: error
          retention-days: 30

      - name: "📊 Build özeti"
        run: |
          echo "## 🦎 Chameleon Mod Build" >> $GITHUB_STEP_SUMMARY
          echo "| Alan | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Zip | \`${{ steps.extract.outputs.zip_path }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ Jar | \`${{ steps.jarinfo.outputs.jar_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📏 Boyut | ${{ steps.jarinfo.outputs.jar_size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Durum | Başarılı |" >> $GITHUB_STEP_SUMMARY

  release:
    name: "🚀 GitHub Release"
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:

      - name: "📥 Artifact indir"
        uses: actions/download-artifact@v4
        with:
          path: release-files/
          merge-multiple: true

      - name: "🚀 Release oluştur"
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.jar
          generate_release_notes: true
          name: "Chameleon Mod ${{ github.ref_name }}"
          body: |
            ## 🦎 Chameleon Mod ${{ github.ref_name }}

            ### Kurulum
            1. `.jar` dosyasını Minecraft `mods/` klasörüne koy
            2. [Fabric API](https://modrinth.com/mod/fabric-api) modunu da ekle
            3. Minecraft 1.20.1 + Fabric ile başlat

            ### Tuşlar
            | Tuş | Açıklama |
            |-----|----------|
            | `C` | Boyama panelini aç/kapat |
            | `V` | Sonraki poz |
            | `B` | Önceki poz |
