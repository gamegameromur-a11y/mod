name: "🦎 Chameleon Mod — Build & Release"

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Zip dosyası adı (boş bırakırsan otomatik bulur)'
        required: false
        default: ''

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "🔨 Build"
    runs-on: ubuntu-latest

    steps:

      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "☕ Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "📦 Zip dosyasını aç"
        id: extract
        run: |
          ZIP_INPUT="${{ github.event.inputs.zip_name }}"
          if [ -n "$ZIP_INPUT" ] && [ -f "$ZIP_INPUT" ]; then
            ZIP="$ZIP_INPUT"
          else
            ZIP=$(find . -maxdepth 1 -name "*.zip" | sort | head -1)
          fi
          if [ -z "$ZIP" ]; then
            echo "❌ Repo kökünde .zip bulunamadı!"
            exit 1
          fi
          echo "✅ Zip: $ZIP"
          echo "zip_path=$ZIP" >> $GITHUB_OUTPUT
          unzip -q "$ZIP" -d extracted/

      - name: "🔧 Kod hatalarını düzelt"
        run: |
          # ── 1. RoleEffects: getSize() → size() ──────────────────────────────
          FILE=$(find extracted -path "*/role/RoleEffects.java" | head -1)
          if [ -n "$FILE" ]; then
            sed -i 's/\.getEnchantments()\.getSize()/.getEnchantments().size()/g' "$FILE"
            echo "✅ RoleEffects: getSize() → size() düzeltildi"
          fi

          # ── 2. PlayerEntityMixin: handleFallDamage inject'ini kaldır ────────
          FILE=$(find extracted -path "*/mixin/PlayerEntityMixin.java" | head -1)
          if [ -n "$FILE" ]; then
            python3 - "$FILE" << 'PYEOF'
          import re, sys
          path = sys.argv[1]
          with open(path) as f:
              src = f.read()
          # handleFallDamage @Inject bloğunu kaldır
          src = re.sub(
              r'\s*@Inject\([^)]*handleFallDamage[^)]*\)[^{]*\{[^}]*\}',
              '', src, flags=re.DOTALL)
          # Kullanılmayan import'u kaldır
          src = re.sub(r'import net\.minecraft\.entity\.damage\.DamageSource;\n', '', src)
          src = re.sub(r'import org\.spongepowered\.asm\.mixin\.injection\.callback\.CallbackInfoReturnable;\n', '', src)
          with open(path, 'w') as f:
              f.write(src)
          print("✅ PlayerEntityMixin: handleFallDamage kaldırıldı")
          PYEOF
          fi

          # ── 3. PlayerModelMixin: BipedEntityModel hedefine çevir ────────────
          FILE=$(find extracted -path "*/mixin/PlayerModelMixin.java" | head -1)
          if [ -n "$FILE" ]; then
            # @Mixin hedefini değiştir
            sed -i 's/@Mixin(PlayerEntityModel\.class)/@Mixin(BipedEntityModel.class)/g' "$FILE"
            # Import ekle (eğer yoksa)
            if ! grep -q "BipedEntityModel" "$FILE"; then
              sed -i 's/import net\.minecraft\.client\.render\.entity\.model\.PlayerEntityModel;/import net.minecraft.client.render.entity.model.BipedEntityModel;\nimport net.minecraft.client.render.entity.model.PlayerEntityModel;/' "$FILE"
            fi
            # setAngles descriptor'ını düzelt — AbstractClientPlayerEntity → LivingEntity
            sed -i 's/method = "setAngles(Lnet\/minecraft\/client\/network\/AbstractClientPlayerEntity;FFFFF)V"/method = "setAngles(Lnet\/minecraft\/entity\/LivingEntity;FFFFF)V"/g' "$FILE"
            # applyCustomPose metod parametresini düzelt
            sed -i 's/private void applyCustomPose(AbstractClientPlayerEntity entity,/private void applyCustomPose(net.minecraft.entity.LivingEntity entity,/g' "$FILE"
            # instanceof kontrolü ekle (entity'yi AbstractClientPlayerEntity'ye cast et)
            sed -i 's/RoleManager\.Role role = RoleManager\.getRole(entity\.getUuid());/if (!(entity instanceof AbstractClientPlayerEntity player)) return;\n        RoleManager.Role role = RoleManager.getRole(player.getUuid());/g' "$FILE"
            # entity. → player. referanslarını güncelle
            sed -i 's/ChameleonPose pose = PlayerPaintStore\.getPose(entity\.getUuid());/ChameleonPose pose = PlayerPaintStore.getPose(player.getUuid());/g' "$FILE"
            echo "✅ PlayerModelMixin: BipedEntityModel hedefine çevrildi"
          fi

      - name: "🔍 Mod klasörünü bul"
        id: moddir
        run: |
          GRADLEW=$(find extracted -name "gradlew" -type f | head -1)
          if [ -n "$GRADLEW" ]; then
            MODDIR=$(dirname "$GRADLEW")
            chmod +x "$GRADLEW"
          else
            BUILD=$(find extracted -name "build.gradle" | head -1)
            if [ -z "$BUILD" ]; then
              echo "❌ build.gradle bulunamadı!"
              find extracted | sort
              exit 1
            fi
            MODDIR=$(dirname "$BUILD")
            printf '#!/bin/sh\nexec gradle "$@"\n' > "$MODDIR/gradlew"
            chmod +x "$MODDIR/gradlew"
          fi
          echo "✅ Mod klasörü: $MODDIR"
          echo "moddir=$MODDIR" >> $GITHUB_OUTPUT

      - name: "⚙️ Gradle kur"
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: "🗄️ Gradle cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('extracted/**/gradle-wrapper.properties', 'extracted/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: "🔨 Derle"
        working-directory: ${{ steps.moddir.outputs.moddir }}
        run: gradle build --no-daemon --stacktrace

      - name: "🔎 Jar dosyasını bul"
        id: jarinfo
        run: |
          MODDIR="${{ steps.moddir.outputs.moddir }}"
          JAR=$(find "$MODDIR/build/libs" -name "*.jar" \
                  ! -name "*-sources.jar" \
                  ! -name "*-dev.jar" \
                  ! -name "*-javadoc.jar" \
                | sort | head -1)
          if [ -z "$JAR" ]; then
            echo "❌ Jar bulunamadı!"
            ls -la "$MODDIR/build/libs/" 2>/dev/null || true
            exit 1
          fi
          JARNAME=$(basename "$JAR")
          JARSIZE=$(du -sh "$JAR" | cut -f1)
          echo "✅ Jar: $JARNAME ($JARSIZE)"
          echo "jar_path=$JAR"     >> $GITHUB_OUTPUT
          echo "jar_name=$JARNAME" >> $GITHUB_OUTPUT
          echo "jar_size=$JARSIZE" >> $GITHUB_OUTPUT

      - name: "📤 Artifact yükle"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.jarinfo.outputs.jar_name }}
          path: ${{ steps.jarinfo.outputs.jar_path }}
          if-no-files-found: error
          retention-days: 30

      - name: "📊 Build özeti"
        run: |
          echo "## 🦎 Chameleon Mod Build" >> $GITHUB_STEP_SUMMARY
          echo "| Alan | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Zip | \`${{ steps.extract.outputs.zip_path }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ Jar | \`${{ steps.jarinfo.outputs.jar_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📏 Boyut | ${{ steps.jarinfo.outputs.jar_size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Durum | Başarılı |" >> $GITHUB_STEP_SUMMARY

  release:
    name: "🚀 GitHub Release"
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:

      - name: "📥 Artifact indir"
        uses: actions/download-artifact@v4
        with:
          path: release-files/
          merge-multiple: true

      - name: "🚀 Release oluştur"
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.jar
          generate_release_notes: true
          name: "Chameleon Mod ${{ github.ref_name }}"
          body: |
            ## 🦎 Chameleon Mod ${{ github.ref_name }}

            ### Kurulum
            1. `.jar` dosyasını Minecraft `mods/` klasörüne koy
            2. [Fabric API](https://modrinth.com/mod/fabric-api) modunu da ekle
            3. Minecraft 1.20.1 + Fabric ile başlat

            ### Tuşlar
            | Tuş | Açıklama |
            |-----|----------|
            | `C` | Boyama panelini aç/kapat |
            | `V` | Sonraki poz |
            | `B` | Önceki poz |
